<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | Shyle Fashion</title>
  <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"/>
  <style>
    *{box-sizing:border-box;font-family:'Poppins',sans-serif;margin:0;padding:0;}
    body{background:#f9f9f9;color:#222;}
    header{background:#088178;padding:15px;text-align:center;color:#fff;font-size:22px;font-weight:600;}

    /* Cart Table */
    #cart-container{width:90%;margin:40px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
    table{width:100%;border-collapse:collapse;}
    th,td{text-align:center;padding:10px;}
    th{background:#f2f2f2;color:#333;}
    td img{width:60px;height:60px;border-radius:6px;}
    .quantity-control button{background:#088178;color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;}
    .quantity-control input{width:40px;text-align:center;margin:0 4px;}
    .remove-item{background:none;border:none;font-size:18px;cursor:pointer;}
    .total{text-align:right;padding:10px;font-weight:600;font-size:18px;}

    /* Checkout Button */
    .checkout-btn{display:block;margin:20px auto;background:#088178;color:#fff;padding:12px 25px;border:none;border-radius:6px;cursor:pointer;font-size:16px;transition:.3s;}
    .checkout-btn:hover{background:#06665f;}

    /* Checkout Modal */
    #checkoutModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:999;}
    .checkout-content{background:#fff;width:90%;max-width:450px;padding:25px;border-radius:10px;text-align:left;position:relative;}
    .checkout-content h2{color:#088178;margin-bottom:15px;text-align:center;}
    .checkout-content p{text-align:center;margin-bottom:15px;}
    .checkout-content label{font-weight:600;display:block;margin-top:10px;}
    .checkout-content input, .checkout-content textarea, .checkout-content select{
      width:100%;padding:8px;margin-top:5px;border:1px solid #ccc;border-radius:6px;
    }
    .checkout-content button{
      background:#088178;color:#fff;padding:10px 20px;border:none;border-radius:6px;
      cursor:pointer;width:100%;margin-top:15px;font-size:16px;
    }
    .checkout-content button:hover{background:#06665f;}
    .close-btn{position:absolute;top:10px;right:15px;font-size:20px;cursor:pointer;color:#555;}

    @media(max-width:768px){
      td img{width:45px;height:45px;}
      th,td{font-size:13px;}
      .checkout-content{width:90%;}
    }
  </style>
</head>
<body>

<header>Your Shopping Cart</header>

<section id="cart-container">
  <table id="cart-table">
    <thead>
      <tr>
        <th>Image</th>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
        <th>Remove</th>
      </tr>
    </thead>
    <tbody id="cart-items"></tbody>
  </table>

  <div class="total">Subtotal: ₹<span id="total-price">0.00</span></div>

  <button class="checkout-btn" id="openCheckout">Proceed to Checkout</button>
</section>

<!-- Checkout Modal -->
<div id="checkoutModal">
  <div class="checkout-content">
    <span class="close-btn" id="closeModal">&times;</span>
    <h2>Checkout Details</h2>
    <p>Your total is ₹<span id="summary-total">0.00</span></p>

    <form id="checkoutForm">
      <label>Full Name:</label>
      <input type="text" id="name" placeholder="Enter your name" required>

      <label>Email:</label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <label>Address:</label>
      <textarea id="address" rows="3" placeholder="Enter delivery address" required></textarea>

      <label>Payment Method:</label>
      <select id="payment" required>
        <option value="">Select Payment Method</option>
        <option value="COD">Cash on Delivery</option>
        <option value="UPI">UPI</option>
        <option value="Card">Credit/Debit Card</option>
      </select>

      <button type="submit">Place Order</button>
    </form>
  </div>
</div>

<script>
  // --- Cart Logic ---
  const CART_KEY = 'demo_cart_v1';
  const defaultCart = [
    { id: 'tee-001', title: 'Galaxy Explorer Tee', price: 650.00, qty: 1, img: 'img/ct.jpg' },
    { id: 'hood-002', title: 'Cotton Zip Hoodie', price: 890.00, qty: 1, img: 'img/bl.jpg' }
  ];

  function readCart(){ return JSON.parse(localStorage.getItem(CART_KEY)) || defaultCart; }
  function writeCart(cart){ localStorage.setItem(CART_KEY, JSON.stringify(cart)); }

  function renderCart(){
    const cart = readCart();
    const tbody = document.getElementById('cart-items');
    tbody.innerHTML = '';
    cart.forEach(item=>{
      const tr = document.createElement('tr');
      tr.dataset.id = item.id;
      tr.innerHTML = `
        <td><img src="${item.img}" alt=""></td>
        <td>${item.title}</td>
        <td>₹${item.price.toFixed(2)}</td>
        <td>
          <div class="quantity-control">
            <button class="qty-minus">−</button>
            <input type="number" value="${item.qty}" min="1">
            <button class="qty-plus">+</button>
          </div>
        </td>
        <td class="item-total">₹${(item.price*item.qty).toFixed(2)}</td>
        <td><button class="remove-item">🗑️</button></td>
      `;
      tbody.appendChild(tr);
    });
    updateTotal();
  }

  function updateTotal(){
    const cart = readCart();
    let subtotal = 0;
    cart.forEach(i => subtotal += i.price * i.qty);
    document.getElementById('total-price').innerText = subtotal.toFixed(2);
    document.getElementById('summary-total').innerText = subtotal.toFixed(2);
  }

  // Quantity and Remove Events
  document.addEventListener('click', (e)=>{
    const cart = readCart();
    if(e.target.classList.contains('qty-plus') || e.target.classList.contains('qty-minus')){
      const tr = e.target.closest('tr');
      const id = tr.dataset.id;
      const item = cart.find(i=>i.id===id);
      const input = tr.querySelector('input');
      if(e.target.classList.contains('qty-plus')) item.qty++;
      else if(item.qty>1) item.qty--;
      input.value = item.qty;
      writeCart(cart);
      renderCart();
    }
    if(e.target.classList.contains('remove-item')){
      const id = e.target.closest('tr').dataset.id;
      const updated = cart.filter(i=>i.id!==id);
      writeCart(updated);
      renderCart();
    }
  });

  // --- Checkout Modal Controls ---
  const modal = document.getElementById("checkoutModal");
  const openBtn = document.getElementById("openCheckout");
  const closeBtn = document.getElementById("closeModal");
  const form = document.getElementById("checkoutForm");

  openBtn.addEventListener("click", () => {
    modal.style.display = "flex";
    document.body.style.overflow = "hidden";
  });

  closeBtn.addEventListener("click", ()=>{
    modal.style.display = "none";
    document.body.style.overflow = "auto";
  });

  modal.addEventListener("click", (e) => {
    if (e.target === modal) {
      modal.style.display = "none";
      document.body.style.overflow = "auto";
    }
  });

  // --- Place Order Form Validation ---
  form.addEventListener("submit", (e)=>{
    e.preventDefault();
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const address = document.getElementById("address").value.trim();
    const payment = document.getElementById("payment").value;

    if(!name || !email || !address || !payment){
      alert("⚠️ Please fill all the required fields.");
      return;
    }

    alert(`🎉 Thank you, ${name}! Your order has been placed successfully.`);
    modal.style.display = "none";
    document.body.style.overflow = "auto";
    localStorage.removeItem(CART_KEY);
    renderCart();
    form.reset();
  });

  renderCart();
</script>
</body>
</html>
